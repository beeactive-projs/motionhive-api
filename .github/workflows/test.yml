name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run build
      - run: npm run test:ci
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-chars-long
          DATABASE_URL: postgres://fake:fake@localhost:5432/fake
          STRIPE_SECRET_KEY: sk_test_ci_fake_key_not_used_at_runtime_abcdef
          STRIPE_PUBLISHABLE_KEY: pk_test_ci_fake_key_not_used_at_runtime_abcdef
          STRIPE_WEBHOOK_SECRET: whsec_ci_fake_not_used_at_runtime_12345678
